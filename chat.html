<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Astrid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #C4521A;
      --orange-hi:   #D45F20;
      --orange-dim:  #7a3210;
      --bg:          #0d0b09;
      --bg-2:        #141210;
      --bg-3:        #1c1916;
      --border:      #2a2420;
      --border-warm: #3a2e28;
      --text:        #F0EDE8;
      --text-dim:    #9a9088;
      --text-muted:  #4a4038;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* The orange banner - Golden Meteors signature */
    .top-stripe {
      height: 3px;
      background: var(--orange);
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    header {
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      flex-shrink: 0;
      -webkit-app-region: drag;
      position: relative;
    }

    /* Space for macOS traffic lights */
    .tl-spacer {
      width: 78px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: "Didot", "Bodoni MT", "Playfair Display", "Big Caslon", Georgia, serif;
      font-size: 17px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.12em;
      color: var(--text);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-app-region: no-drag;
    }

    .model-badge {
      font-size: 10px;
      color: var(--text-muted);
      font-family: "SF Mono", "Menlo", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #new-chat-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
      font-size: 10px;
      padding: 5px 11px;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }

    #new-chat-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-warm); border-radius: 2px; }

    .message {
      max-width: 78%;
      line-height: 1.65;
      font-size: 14.5px;
    }

    .message.user {
      align-self: flex-end;
      background: var(--bg-2);
      border: 1px solid var(--border-warm);
      border-left: 2px solid var(--orange);
      color: var(--text);
      padding: 10px 15px;
      border-radius: 2px 10px 10px 2px;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message.assistant .bubble {
      background: var(--bg-2);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 10px 10px 10px 2px;
      color: var(--text);
    }

    .message.assistant .meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
      padding-left: 3px;
      font-family: "SF Mono", monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 13px 16px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 10px 10px 10px 2px;
      align-self: flex-start;
      width: fit-content;
    }

    .typing span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--orange);
      animation: pulse 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.2; transform: scale(0.8); }
      30%            { opacity: 1;   transform: scale(1); }
    }

    #input-area {
      padding: 14px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--bg);
    }

    #input {
      flex: 1;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14.5px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--orange-dim); }
    #input::placeholder { color: var(--text-muted); }

    #send {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--orange);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send:hover    { background: var(--orange-hi); }
    #send:disabled { background: var(--bg-3); cursor: not-allowed; }
    #send svg { width: 14px; height: 14px; fill: white; }

    code {
      background: var(--bg-3);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 13px;
      color: #c9a97a;
    }

    pre {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }

    pre code { background: none; padding: 0; color: var(--text-dim); }
    strong { color: #d4a87a; }
    em     { color: var(--text-dim); font-style: italic; }
  </style>
</head>
<body>

<div class="top-stripe"></div>

<header>
  <div class="tl-spacer"></div>
  <h1>Astrid</h1>
  <div class="header-right">
    <span class="model-badge" id="model-badge"></span>
    <button id="new-chat-btn">New Chat</button>
  </div>
</header>

<div id="messages"></div>

<div id="input-area">
  <textarea id="input" placeholder="Message Astrid..." rows="1"></textarea>
  <button id="send">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
  const API_BASE   = `http://${location.hostname || 'localhost'}:8000`;
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');
  const modelBadge = document.getElementById('model-badge');
  const newChatBtn = document.getElementById('new-chat-btn');

  function getSessionId() {
    let id = localStorage.getItem('session_id');
    if (!id) { id = crypto.randomUUID(); localStorage.setItem('session_id', id); }
    return id;
  }

  let sessionId = getSessionId();
  let history   = [];

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  function addMessage(role, content, meta) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (role === 'assistant') {
      div.innerHTML = `<div class="bubble">${renderMarkdown(content)}</div>`;
      if (meta) {
        const m = document.createElement('div');
        m.className = 'meta';
        m.textContent = `${meta.model} · ${meta.task_type}`;
        div.appendChild(m);
        modelBadge.textContent = meta.model;
      }
    } else {
      div.textContent = content;
    }
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  async function loadHistory() {
    try {
      const res  = await fetch(`${API_BASE}/session/${sessionId}`);
      const data = await res.json();
      history = data.messages || [];
      for (const msg of history) addMessage(msg.role, msg.content, null);
    } catch (e) { /* proxy not ready yet */ }
  }

  async function newChat() {
    try { await fetch(`${API_BASE}/session/${sessionId}`, { method: 'DELETE' }); } catch (e) {}
    sessionId = crypto.randomUUID();
    localStorage.setItem('session_id', sessionId);
    history = [];
    messagesEl.innerHTML = '';
    modelBadge.textContent = '';
    inputEl.focus();
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    autoResize();
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    const typing = addTyping();

    try {
      const res  = await fetch(`${API_BASE}/complete`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, session_id: sessionId }),
      });
      const data = await res.json();
      typing.remove();
      addMessage('assistant', data.content, { model: data.model, task_type: data.task_type });
      history.push({ role: 'assistant', content: data.content });
    } catch (e) {
      typing.remove();
      addMessage('assistant', 'Connection error - is the proxy running?', null);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);
  newChatBtn.addEventListener('click', newChat);

  loadHistory();
</script>
</body>
</html>
